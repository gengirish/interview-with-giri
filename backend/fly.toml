app = "interview-with-giri-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  build-target = "production"

[deploy]
  release_command = "alembic upgrade head"

[env]
  APP_ENV = "production"
  DEBUG = "false"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/v1/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
