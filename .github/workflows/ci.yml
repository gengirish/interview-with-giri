name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nox-session: ["lint", "type_check"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
        working-directory: backend
      - run: uv run nox -s ${{ matrix.nox-session }}
        working-directory: backend

  backend-smoke:
    name: "Backend Tests (smoke)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interviewbot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
        working-directory: backend
      - name: Run smoke tests
        run: uv run pytest tests/ -m smoke --timeout=60 -q
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/interviewbot_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key-do-not-use-in-prod
          OPENAI_API_KEY: sk-test-fake
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_test_fake

  backend-full:
    name: "Backend Tests (full)"
    runs-on: ubuntu-latest
    needs: [backend-smoke]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interviewbot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
        working-directory: backend
      - name: Run full test suite (including E2E)
        run: uv run pytest tests/ -v --timeout=90 --tb=short --cov=interviewbot --cov-report=xml --cov-report=term-missing
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/interviewbot_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key-do-not-use-in-prod
          OPENAI_API_KEY: sk-test-fake
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_test_fake
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 14

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - run: npm ci
        working-directory: frontend
      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true
      - run: npm run lint
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
          NEXT_PUBLIC_LIVEKIT_URL: ws://localhost:7880
          NEXT_PUBLIC_STRIPE_KEY: pk_test_fake

  frontend-e2e:
    name: "Frontend E2E (Playwright)"
    needs: [frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npx playwright test
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
          NEXT_PUBLIC_WS_URL: ws://localhost:8001
          NEXT_PUBLIC_LIVEKIT_URL: ws://localhost:7880
          NEXT_PUBLIC_STRIPE_KEY: pk_test_fake
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
        working-directory: backend
      - name: Audit Python dependencies
        run: uv run pip-audit
        working-directory: backend
        continue-on-error: true

  deploy-backend:
    needs: [backend-full]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
        working-directory: backend
      - name: Post-deploy health check
        run: uv run python ../scripts/post_deploy_check.py
        working-directory: backend
        continue-on-error: true
        env:
          BACKEND_URL: https://interview-bot-giri.fly.dev

  deploy-frontend:
    needs: [frontend, frontend-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - run: npm ci
        working-directory: frontend
      - run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
